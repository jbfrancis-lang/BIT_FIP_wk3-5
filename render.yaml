services:
  - type: web
    name: societybridge-ai-sinjeongbin
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.21.0
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
